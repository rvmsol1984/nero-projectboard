name: Deploy NERO ProjectBoard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Hetzner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: https://npb.rvmsol.com/api

      - name: Copy built frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "client/dist/"
          target: "/root/nero-projectboard/client/dist"
          strip_components: 2

      - name: Deploy server and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /root/nero-projectboard
            git pull origin main
            cd server && npm install --omit=dev
            pm2 reload nero-projectboard || pm2 start ecosystem.config.js --env production
            echo "Deploy complete"
