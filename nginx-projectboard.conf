server {
    listen 80;
    server_name npb.rvmsol.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name npb.rvmsol.com;

    ssl_certificate     /etc/ssl/cloudflare/opencti-cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/opencti-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /root/nero-projectboard/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    access_log /var/log/nginx/projectboard-access.log;
    error_log  /var/log/nginx/projectboard-error.log;
}
